<script>
    if (!Array.from) {
      Array.from = function (value) {
        return Array.prototype.slice.call(value);
      };
    }

    if (!Array.prototype.find) {
      Array.prototype.find = function (callback, thisArg) {
        for (var i = 0; i < this.length; i++) {
          if (callback.call(thisArg, this[i], i, this)) return this[i];
        }
        return undefined;
      };
    }

     function okgetCookie(name) {
        var nameEQ = name + "=";
        var ca = document.cookie.split(';');
        for (var i = 0; i < ca.length; i++) {
          var c = ca[i];
          while (c.charAt(0) === ' ') c = c.substring(1, c.length);
          if (c.indexOf(nameEQ) === 0) return c.substring(nameEQ.length, c.length);
        }
      return null; // 如果没有找到 cookie，返回 null
    }
	    var botadmin = okgetCookie("codekey");
	    var startDataValue = 0;
	    var endDateValue = 0;
	    localStorage.removeItem('result');
	    window.billFilterState = {
	      replyUser: '全部',
	      operator: '全部',
      remark: '全部',
      splitNegativeIn: false
    };

    function billFilterText(value) {
      return value === undefined || value === null ? '' : String(value);
    }

      function billFilterName(user) {
        if (!user) return '';
        return billFilterText(user.first_name);
      }

      function billFilterUserId(user) {
        if (!user) return '';
        return billFilterText(user.id);
      }

    function billFilterNumber(value) {
      var number = Number(value);
      return isFinite(number) ? number : 0;
    }

    function billFilterMoney(value) {
      return billFilterNumber(value).toFixed(2);
    }

	    function isBillFilterActive() {
	      return window.billFilterState.replyUser !== '全部' ||
	        window.billFilterState.operator !== '全部' ||
	        window.billFilterState.remark !== '全部';
	    }

	    window.clearBillDomData = function () {
	      localStorage.removeItem('result');
	      var oldSection = document.getElementById('negative-in-section');
	      if (oldSection && oldSection.parentNode) oldSection.parentNode.removeChild(oldSection);
	      window.updateBillFilterSummary([]);
	      if (typeof window.updateBillFilterOptions === 'function') window.updateBillFilterOptions([]);
	    };

	    window.showBillLoadError = function (message) {
	      var filterBar = document.getElementById('bill-filter-bar');
	      if (!filterBar) return;
	      filterBar.classList.remove('is-ready');
	      filterBar.classList.add('is-error');
	      filterBar.innerHTML = '<span>' + (message || '加载数据超时,请切换网络或稍后重试！') + '</span>';
	      window.updateBillFilterSummary([]);
	    };

    window.getFilteredBillsForSummary = function () {
      var result = localStorage.getItem('result');
      if (!result) return [];
      var resultJson;
      try {
        resultJson = JSON.parse(result);
      } catch (error) {
        return [];
      }
        var bills = Array.isArray(resultJson.bills) ? resultJson.bills : [];
        return bills.filter(function (bill) {
          var replyUserId = billFilterUserId(bill.replyUser);
          var operatorId = billFilterUserId(bill.user);
          var remark = billFilterText(bill.remark);
          return (window.billFilterState.replyUser === '全部' || replyUserId === window.billFilterState.replyUser) &&
            (window.billFilterState.operator === '全部' || operatorId === window.billFilterState.operator) &&
            (window.billFilterState.remark === '全部' || remark === window.billFilterState.remark);
        });
      };

    function getCurrentFilteredBills() {
      return window.getFilteredBillsForSummary();
    }

    function findHeadingByText(tagName, text) {
      var headings = Array.from(document.getElementsByTagName(tagName));
      for (var i = 0; i < headings.length; i++) {
        if (headings[i].textContent.indexOf(text) !== -1) return headings[i];
      }
      return null;
    }

    function getBillTableColumnWidths(table) {
      if (!table) return [];
      var headerCells = table.getElementsByTagName('th');
      var cells = headerCells.length > 0 ? headerCells : table.getElementsByTagName('td');
      var widths = [];
      for (var i = 0; i < cells.length; i++) {
        var width = cells[i].getBoundingClientRect ? cells[i].getBoundingClientRect().width : cells[i].offsetWidth;
        if (width > 0) widths.push(width);
      }
      return widths;
    }

    function applyNegativeInColumnStyle(tableBlock, sourceWidths) {
      if (!tableBlock) return;
      Array.from(tableBlock.getElementsByTagName('table')).forEach(function (table) {
        table.style.tableLayout = 'fixed';
      });
      Array.from(tableBlock.getElementsByTagName('colgroup')).forEach(function (colgroup) {
        var cols = colgroup.getElementsByTagName('col');
        for (var colIndex = 0; colIndex < cols.length; colIndex++) {
          if (sourceWidths && sourceWidths[colIndex]) {
            cols[colIndex].style.width = sourceWidths[colIndex] + 'px';
            cols[colIndex].style.maxWidth = sourceWidths[colIndex] + 'px';
          }
        }
      });
      Array.from(tableBlock.getElementsByTagName('tr')).forEach(function (row) {
        var cells = Array.from(row.children).filter(function (cell) {
          return cell.tagName === 'TD' || cell.tagName === 'TH';
        });
        for (var cellIndex = 0; cellIndex < cells.length; cellIndex++) {
          if (sourceWidths && sourceWidths[cellIndex]) {
            cells[cellIndex].style.width = sourceWidths[cellIndex] + 'px';
            cells[cellIndex].style.maxWidth = sourceWidths[cellIndex] + 'px';
          }
        }
        var operatorCell = cells[4];
        if (!operatorCell) return;
        operatorCell.className = (operatorCell.className ? operatorCell.className + ' ' : '') + 'negative-in-operator-cell';
        operatorCell.style.overflow = 'hidden';
        operatorCell.style.textOverflow = 'ellipsis';
        operatorCell.style.whiteSpace = 'nowrap';
        Array.from(operatorCell.children).forEach(function (child) {
          child.style.display = 'block';
          child.style.maxWidth = '100%';
          child.style.overflow = 'hidden';
          child.style.textOverflow = 'ellipsis';
          child.style.whiteSpace = 'nowrap';
        });
      });
    }

    function renderNegativeInFallbackTable(bills) {
      var oldSection = document.getElementById('negative-in-section');
      if (oldSection && oldSection.parentNode) oldSection.parentNode.removeChild(oldSection);
      if (!window.billFilterState.splitNegativeIn || bills.length === 0) return;
      var negativeIds = bills.map(function (bill) {
        return billFilterText(bill.messageid);
      }).filter(function (messageId) {
        return messageId !== '';
      });
        var vueOutHeading = null;
        var allH2 = Array.from(document.getElementsByTagName('h2'));
        for (var h2Index = 0; h2Index < allH2.length; h2Index++) {
          if (allH2[h2Index].id !== 'negative-in-fallback-title' && allH2[h2Index].textContent.indexOf('出账(') !== -1) {
            vueOutHeading = allH2[h2Index];
            break;
          }
        }
      if (vueOutHeading) return;

      var section = document.createElement('div');
      section.id = 'negative-in-section';
      section.className = 'negative-in-section';
      var outHeading = findHeadingByText('h2', '下发');
      var title = outHeading ? outHeading.cloneNode(false) : document.createElement('h2');
      title.id = 'negative-in-fallback-title';
      title.textContent = '出账(' + bills.length + '笔) ';
      section.appendChild(title);

      var firstTable = document.getElementsByClassName('n-data-table-table')[0];
      var sourceWidths = getBillTableColumnWidths(firstTable);
      var sourceTableBlock = firstTable;
      var parentBlock = firstTable ? firstTable.parentNode : null;
      while (parentBlock && parentBlock !== document.body) {
        if (parentBlock.classList && parentBlock.classList.contains('n-data-table')) {
          sourceTableBlock = parentBlock;
          break;
        }
        parentBlock = parentBlock.parentNode;
      }
      if (sourceTableBlock && negativeIds.length > 0) {
        var clonedTableBlock = sourceTableBlock.cloneNode(true);
        Array.from(clonedTableBlock.getElementsByTagName('tr')).forEach(function (row) {
          var cells = row.getElementsByTagName('td');
          if (cells.length === 0) return;
          var lastCell = cells[cells.length - 1];
          var messageId = lastCell.textContent.trim();
          if (negativeIds.indexOf(messageId) !== -1) {
            row.style.display = '';
            return;
          }
          if (row.parentNode) row.parentNode.removeChild(row);
        });
        applyNegativeInColumnStyle(clonedTableBlock, sourceWidths);
        section.appendChild(clonedTableBlock);
      } else {
        var rows = bills.map(function (bill) {
          return '<tr>' +
            '<td>' + billFilterText(bill.time) + '</td>' +
            '<td>' + billFilterMoney(bill.baseAmount) + '</td>' +
            '<td>' + billFilterMoney(bill.currenyAmount) + '</td>' +
            '<td>' + billFilterName(bill.replyUser) + '</td>' +
            '<td>' + billFilterName(bill.user) + '</td>' +
            '<td>' + billFilterText(bill.remark) + '</td>' +
            '</tr>';
        }).join('');
        var tableWrapper = document.createElement('div');
        tableWrapper.innerHTML =
          '<table class="negative-in-table">' +
          '<thead><tr><th>时间</th><th>金额</th><th>结算</th><th>标记人</th><th>操作人</th><th>备注</th></tr></thead>' +
          '<tbody>' + rows + '</tbody>' +
          '</table>';
        applyNegativeInColumnStyle(tableWrapper, sourceWidths);
        section.appendChild(tableWrapper);
      }

      if (outHeading && outHeading.parentNode) {
        outHeading.parentNode.insertBefore(section, outHeading);
      }
    }

    window.applyNegativeInSplitFallback = function () {
      var bills = getCurrentFilteredBills();
      var inBills = bills.filter(function (bill) {
        return bill.type === 'in';
      });
      var outBills = bills.filter(function (bill) {
        return bill.type === 'out';
      });
      var negativeBills = inBills.filter(function (bill) {
        return billFilterNumber(bill.baseAmount) < 0;
      });
      var negativeIds = negativeBills.map(function (bill) {
        return billFilterText(bill.messageid);
      }).filter(function (messageId) {
        return messageId !== '';
      });
      var splitEnabled = !!window.billFilterState.splitNegativeIn;
      var visibleInIds = inBills.map(function (bill) {
        return billFilterText(bill.messageid);
      }).filter(function (messageId) {
        return messageId !== '';
      });
      var visibleOutIds = outBills.map(function (bill) {
        return billFilterText(bill.messageid);
      }).filter(function (messageId) {
        return messageId !== '';
      });

      var inHeading = findHeadingByText('h1', '入账');
      if (inHeading) {
        inHeading.textContent = ' 入账(' + (splitEnabled ? inBills.length - negativeBills.length : inBills.length) + '笔) ';
      }
      var outHeadingText = findHeadingByText('h2', '下发');
      if (outHeadingText) {
        outHeadingText.textContent = ' 下发(' + outBills.length + '笔) ';
      }

      var firstTable = document.getElementsByClassName('n-data-table-table')[0];
      if (firstTable) {
        Array.from(firstTable.getElementsByTagName('tr')).forEach(function (row) {
          var lastCell = row.lastElementChild;
          if (!lastCell) return;
          var messageId = lastCell.textContent.trim();
          if (!messageId) return;
          var shouldShow = visibleInIds.indexOf(messageId) !== -1;
          if (splitEnabled && negativeIds.indexOf(messageId) !== -1) shouldShow = false;
          row.style.display = shouldShow ? '' : 'none';
        });
      }

      var secondTable = document.getElementsByClassName('n-data-table-table')[1];
      if (secondTable) {
        Array.from(secondTable.getElementsByTagName('tr')).forEach(function (row) {
          var lastCell = row.lastElementChild;
          if (!lastCell) return;
          var messageId = lastCell.textContent.trim();
          if (!messageId) return;
          row.style.display = visibleOutIds.indexOf(messageId) !== -1 ? '' : 'none';
        });
      }

      renderNegativeInFallbackTable(splitEnabled ? negativeBills : []);
    };

    window.applyBillDomFilters = function () {
      window.updateBillFilterSummary(window.getFilteredBillsForSummary());
      window.applyNegativeInSplitFallback();
    };

    window.billDomDataChanged = function () {
      var result = localStorage.getItem('result');
      if (!result) return;
      var resultJson;
      try {
        resultJson = JSON.parse(result);
      } catch (error) {
        return;
      }
      var bills = Array.isArray(resultJson.bills) ? resultJson.bills : [];
      window.updateBillFilterOptions(bills);
      setTimeout(function () {
        window.applyBillDomFilters();
      }, 300);
    };

    var lastBillResultForFilters = '';
    setInterval(function () {
      var result = localStorage.getItem('result') || '';
      if (result && result !== lastBillResultForFilters) {
        lastBillResultForFilters = result;
        window.billDomDataChanged();
      }
    }, 800);

    window.updateBillFilterSummary = function (bills) {
      var summary = document.getElementById('bill-filter-summary');
      if (!summary) return;
      if (!isBillFilterActive()) {
        summary.classList.remove('is-visible');
        summary.innerHTML = '';
        return;
      }

      bills = Array.isArray(bills) ? bills : [];
      var inPositiveBase = 0;
      var inNegativeBase = 0;
      var inBaseTotal = 0;
      var inCurrencyTotal = 0;
      var outCurrencyTotal = 0;

      bills.forEach(function (bill) {
        if (bill.type === 'in') {
          var baseAmount = billFilterNumber(bill.baseAmount);
          var currenyAmount = billFilterNumber(bill.currenyAmount);
          if (baseAmount > 0) inPositiveBase += baseAmount;
          if (baseAmount < 0) inNegativeBase += baseAmount;
          inBaseTotal += baseAmount;
          inCurrencyTotal += currenyAmount;
        }
        if (bill.type === 'out') {
          outCurrencyTotal += billFilterNumber(bill.currenyAmount);
        }
      });

      summary.innerHTML =
        '<div><span style="color: rgb(0, 176, 240);">筛选后总计</span></div>' +
        '<div>总明细：↓ ' + billFilterMoney(inPositiveBase) + ' ↑ ' + billFilterMoney(Math.abs(inNegativeBase)) + '</div>' +
        '<div>总入款：' + billFilterMoney(inBaseTotal) + '</div>' +
        '<div>应下发：' + billFilterMoney(inCurrencyTotal) + '</div>' +
        '<div>已下发：' + billFilterMoney(outCurrencyTotal) + '</div>' +
        '<div>待下发：' + billFilterMoney(inCurrencyTotal - outCurrencyTotal) + '</div>';
      summary.classList.add('is-visible');
    };

    window.resetBillFilters = function () {
      window.billFilterState.replyUser = '全部';
      window.billFilterState.operator = '全部';
      window.billFilterState.remark = '全部';
      window.billFilterState.splitNegativeIn = false;
      var replySelect = document.getElementById('reply-user-filter');
      var operatorSelect = document.getElementById('operator-filter');
      var remarkSelect = document.getElementById('remark-filter');
      var splitCheckbox = document.getElementById('split-negative-in-filter');
      var filterBar = document.getElementById('bill-filter-bar');
      if (replySelect) replySelect.value = '全部';
      if (operatorSelect) operatorSelect.value = '全部';
      if (remarkSelect) remarkSelect.value = '全部';
      if (splitCheckbox) splitCheckbox.checked = false;
      if (filterBar) filterBar.classList.remove('is-ready');
      window.updateBillFilterSummary([]);
      if (typeof window.applyBillDomFilters === 'function') window.applyBillDomFilters();
    };

      function addBillFilterOption(options, value, label) {
        value = billFilterText(value);
        if (!value) return;
        for (var i = 0; i < options.length; i++) {
          if (options[i].value === value) return;
        }
        options.push({
          value: value,
          label: label || value
        });
      }

      function fillBillFilterOptions(selectId, values, selectedValue) {
        var select = document.getElementById(selectId);
        if (!select) return;
        var currentValue = selectedValue || select.value || '全部';
        select.innerHTML = '<option value="全部">全部</option>';
        var hasCurrentValue = currentValue === '全部';
        values.forEach(function (item) {
          var value = typeof item === 'object' ? item.value : item;
          var label = typeof item === 'object' ? item.label : item;
          var option = document.createElement('option');
          option.value = value;
          option.textContent = label;
          select.appendChild(option);
          if (value === currentValue) hasCurrentValue = true;
        });
        select.value = hasCurrentValue ? currentValue : '全部';
      }

    window.updateBillFilterOptions = function (bills) {
      bills = Array.isArray(bills) ? bills : [];
